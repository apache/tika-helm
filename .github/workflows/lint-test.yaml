name: Lint and Test Charts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.list-changed.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2
      - name: Set up chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "::set-output name=changed::true"
          fi
        shell: bash
      - name: Run chart-testing (lint)
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --charts .
        shell: bash
      - name: Install helm-unittest
        run: |
          helm plugin uninstall unittest 2>/dev/null || true
          helm plugin install --verify=false https://github.com/helm-unittest/helm-unittest
        shell: bash
      - name: Run unit tests
        run: helm unittest .
        shell: bash

  install-test:
    needs: lint-test
    if: needs.lint-test.outputs.changed == 'true'
    uses: ./.github/workflows/install-test-chart.yaml
    with:
      ref: ${{ github.sha }}
